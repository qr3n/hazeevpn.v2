# ==========================================
# HTTP: Редирект на HTTPS и проверка Certbot
# ==========================================
server {
    listen 80;
    server_name webapp.hazeevpn.com;
    server_tokens off;

    # Специальный путь для продления сертификатов Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Все остальные запросы перенаправляем на защищенное соединение
    location / {
        return 301 https://$host$request_uri;
    }
}

# ==========================================
# HTTPS: Основной сервер с оптимизациями
# ==========================================
server {
    listen 443 ssl;
    http2 on; # Современное включение HTTP/2 для Nginx >= 1.25.1

    server_name webapp.hazeevpn.com;
    server_tokens off;

    # Пути к сертификатам
    ssl_certificate /etc/letsencrypt/live/webapp.hazeevpn.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/webapp.hazeevpn.com/privkey.pem;

    # Настройки безопасности SSL
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Оптимизация сети
    tcp_nopush on;
    tcp_nodelay on;

    # Включение сжатия Gzip
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types application/javascript application/json application/xml text/css text/plain text/xml image/svg+xml;

    # 1. Агрессивное кэширование неизменяемой статики Next.js
    location /_next/static/ {
        proxy_pass http://web:3000;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # 2. Основной прокси на приложение
    location / {
        proxy_pass http://web:3000;

        # Поддержка WebSockets (необходимо для Next.js)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        # Проброс реального IP-адреса
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Увеличенные буферы для ответов (чтобы не писать на диск)
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }
}