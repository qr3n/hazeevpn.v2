# Перенаправление с HTTP на HTTPS
server {
    listen 80;
    server_name webapp.hazeevpn.com;
    server_tokens off;

    # Оставляем для будущего автоматического обновления сертификатов
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Основной сервер HTTPS
server {
    listen 443 ssl;
    server_name webapp.hazeevpn.com;
    server_tokens off;

    # Пути к твоим новым сертификатам
    ssl_certificate /etc/letsencrypt/live/webapp.hazeevpn.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/webapp.hazeevpn.com/privkey.pem;

    # Настройки безопасности SSL
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    location / {
        # Проксируем трафик на контейнер Next.js
        proxy_pass http://web:3000;

        # Настройки для поддержки WebSockets (важно для Next.js)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        # Проброс реального IP пользователя к Next.js приложению
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}